name: Download Artifact
description: Download artifact that is not a part of the current run.

inputs:
  token:
    description: 'GitHub token (secrets.GITHUB_TOKEN or a PAT) used to query the API.'
    required: true
  commit:
    description: 'The full 40-character commit hash to search for.'
    required: true
  artifact-name:
    description: 'The name of the artifact to download.'
    required: true

runs:
  using: 'node20'
  main: 'dist/index.js'